name: SBOM and commit evidence

# Generate SPDX + CycloneDX SBOMs, pin them to IPFS, then record the resulting
# IPFS CID on-chain as commit evidence via the contract's `set_evidence`. The
# evidence step reuses the artifact the SBOM job already produced — it does not
# regenerate anything, just a single CLI call with the existing CID.
#
# record-evidence configuration (repository environment `publish-evidence`):
#   secrets.TANSU_SECRET_KEY   Stellar secret key (S...) of a project maintainer
#   vars.TANSU_CONTRACT_ID     Deployed Tansu contract id (C...)
#   vars.TANSU_PROJECT_KEY     Project key (hex), i.e. keccak256(project name)
#   vars.TANSU_MAINTAINER      Maintainer address (G...) matching TANSU_SECRET_KEY
#   vars.TANSU_NETWORK         Stellar network name (defaults to "testnet")

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-sbom:
    name: Generate SPDX and CycloneDX SBOM with Trivy
    runs-on: ubuntu-latest
    container: alpine:latest
    environment:
      name: sbom-ipfs
    outputs:
      cid: ${{ steps.filebase.outputs.cid }}

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache curl wget git jq

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Trivy
        run: |
          wget -qO - https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOMs
        run: |
          trivy fs --format spdx-json --output sbom.spdx.json .
          trivy fs --format cyclonedx --output sbom.cyclonedx.json .

      - name: Upload SBOMs as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

      - name: Create SBOM directory for IPFS upload
        run: |
          mkdir -p sbom-release
          cp sbom.spdx.json sbom-release/
          cp sbom.cyclonedx.json sbom-release/

      - name: Upload SBOMs to Filebase
        id: filebase
        env:
          FILEBASE_TOKEN: ${{ secrets.FILEBASE_TOKEN }}
        run: |
          FILEBASE_RESPONSE="$(
            curl --silent --show-error --fail \
              -X POST \
              -H "Authorization: Bearer ${FILEBASE_TOKEN}" \
              "https://rpc.filebase.io/api/v0/add?wrap-with-directory=true" \
              -F "file=@sbom-release/sbom.spdx.json;filename=sbom.spdx.json;type=application/json" \
              -F "file=@sbom-release/sbom.cyclonedx.json;filename=sbom.cyclonedx.json;type=application/json"
          )"
          printf '%s\n' "${FILEBASE_RESPONSE}"

          cid="$(printf '%s\n' "${FILEBASE_RESPONSE}" | jq -r '.Hash // .Cid // empty' | tail -n 1)"

          if [ -z "${cid}" ]; then
            echo "Unable to determine Filebase directory CID from upload response" >&2
            exit 1
          fi

          {
            echo "cid=${cid}"
            echo "url=https://ipfs.filebase.io/ipfs/${cid}"
          } >> "${GITHUB_OUTPUT}"

      - name: Job summary
        run: |
          echo "### SBOMs uploaded to IPFS! :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- CID: ${STEPS_FILEBASE_OUTPUTS_CID}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${STEPS_FILEBASE_OUTPUTS_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Formats: SPDX JSON, CycloneDX JSON" >> "$GITHUB_STEP_SUMMARY"
        env:
          STEPS_FILEBASE_OUTPUTS_CID: ${{ steps.filebase.outputs.cid }}
          STEPS_FILEBASE_OUTPUTS_URL: ${{ steps.filebase.outputs.url }}

  record-evidence:
    name: Record SBOM evidence on-chain
    needs: generate-sbom
    runs-on: ubuntu-latest
    environment:
      name: publish-evidence

    env:
      STELLAR_CLI_VERSION: "27.0.0"
      TANSU_NETWORK: ${{ vars.TANSU_NETWORK || 'testnet' }}
      TANSU_CONTRACT_ID: ${{ vars.TANSU_CONTRACT_ID }}
      TANSU_PROJECT_KEY: ${{ vars.TANSU_PROJECT_KEY }}
      TANSU_MAINTAINER: ${{ vars.TANSU_MAINTAINER }}
      TANSU_SOURCE_ACCOUNT: ${{ secrets.TANSU_SECRET_KEY }}
      SBOM_CID: ${{ needs.generate-sbom.outputs.cid }}

    steps:
      - name: Install Stellar CLI
        run: |
          curl -fsSL -o stellar-cli.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf stellar-cli.tar.gz
          sudo install -m 0755 stellar /usr/local/bin/stellar
          stellar --version

      - name: Record SBOM evidence on-chain
        run: |
          stellar contract invoke \
            --source-account "${TANSU_SOURCE_ACCOUNT}" \
            --network "${TANSU_NETWORK}" \
            --id "${TANSU_CONTRACT_ID}" \
            -- \
            set_evidence \
            --maintainer "${TANSU_MAINTAINER}" \
            --project_key "${TANSU_PROJECT_KEY}" \
            --commit_hash "${GITHUB_SHA}" \
            --kind Sbom \
            --cid "${SBOM_CID}"
